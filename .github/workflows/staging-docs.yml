name: Stage Blog Preview

on:
  push:
    branches:
      - blogpost
      - blogpost-aesthetic
      - blogpost-rl-gepa

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/pyproject.toml
            **/uv.lock
            docs/requirements.txt

      - name: Create virtual environment
        run: |
          uv venv .venv --python 3.11
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH

      - name: Install GEPA package
        run: uv pip install -e ".[full]" -p .venv

      - name: Install system dependencies for social cards
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libfreetype6-dev libffi-dev libjpeg-dev libpng-dev libz-dev

      - name: Install documentation dependencies
        run: |
          cd docs
          uv pip install -r requirements.txt -p ../.venv

      - name: Generate API documentation
        run: |
          cd docs
          uv run -p ../.venv python scripts/generate_api_docs.py

      - name: Disable draft_if_future_date for staging
        run: |
          cd docs
          sed -i 's/draft_if_future_date: true/draft_if_future_date: false/' mkdocs.yml

      - name: Override site_url for staging
        run: |
          cd docs
          # Use the current branch's Cloudflare Pages alias so og:url / og:image
          # resolve to URLs that actually exist on the deployed subdomain.
          sed -i "s|site_url: https://gepa-ai.github.io/gepa/|site_url: https://${{ github.ref_name }}.gepa-docs-staging.pages.dev/|" mkdocs.yml

      - name: Install Playwright browsers
        run: |
          cd docs
          uv run -p ../.venv playwright install chromium --with-deps

      - name: Build documentation
        run: |
          cd docs
          uv run -p ../.venv mkdocs build
        env:
          SCHOLARLY_PDF: "1"

      - name: Generate social preview screenshots
        run: |
          cd docs
          uv run -p ../.venv python scripts/generate_social_screenshots.py

      - name: Add noindex directives (search engines only)
        run: |
          # robots.txt — block general search engine crawlers, but explicitly
          # allow social-preview bots so Twitter / LinkedIn / Slack / Discord /
          # Facebook / WhatsApp / Telegram can fetch the page and render an
          # Open Graph preview when staging URLs are shared.
          #
          # We intentionally do NOT set an X-Robots-Tag header or a
          # <meta name="robots"> tag, because those would also block the
          # social-preview bots above (Twitterbot in particular respects them).
          cat > docs/site/robots.txt << 'EOF'
          User-agent: Twitterbot
          Allow: /

          User-agent: facebookexternalhit
          Allow: /

          User-agent: facebookcatalog
          Allow: /

          User-agent: LinkedInBot
          Allow: /

          User-agent: Slackbot
          Allow: /

          User-agent: Slackbot-LinkExpanding
          Allow: /

          User-agent: Discordbot
          Allow: /

          User-agent: Pinterestbot
          Allow: /

          User-agent: WhatsApp
          Allow: /

          User-agent: TelegramBot
          Allow: /

          User-agent: *
          Disallow: /
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        id: deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gepa-docs-staging
          directory: docs/site
          branch: ${{ github.ref_name }}

      - name: Output deployment URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
